<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokeCatch Overlay (DS scale)</title>
    <style>
      :root { --ds-width: 256; --ds-height: 192; }
      html,body { height:100%; margin:0; background:transparent; }
      .ds-wrapper { width:100%; height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
      .ds-viewport { width: calc(var(--ds-width) * 1px); height: calc(var(--ds-height) * 1px); transform-origin:center center; will-change: transform; }
      .ds-viewport iframe { width:100%; height:100%; border:0; display:block; background: transparent; }
    </style>
  </head>
  <body>
    <div class="ds-wrapper">
      <div class="ds-viewport" id="dsViewport">
        <iframe id="dsFrame" src="./ds.html" allow="clipboard-write"></iframe>
      </div>
    </div>

    <script>
      (function(){
        const viewport = document.getElementById('dsViewport');
        const frame = document.getElementById('dsFrame');
        const dsWidthBase = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--ds-width')) || 256;
        const dsHeightBase = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--ds-height')) || 192;

        // allow overriding the window scale via query param; default to 5x
        const pageParams = new URLSearchParams(window.location.search);
        const dsModeParam = pageParams.get('ds') ?? pageParams.get('ds-mode');
        const dsDisabled = dsModeParam !== null && ['0', 'false', 'off', 'no'].includes(dsModeParam.trim().toLowerCase());
        const dsWindowScale = Math.max(1, parseFloat(pageParams.get('dsWindowScale') || pageParams.get('ds-window-scale')) || 5);
        let params = window.location.search || '';
        const hash = window.location.hash || '';

        if (dsDisabled) {
          window.location.replace('./ds.html' + params + hash);
          return;
        }

        const viewportWidth = dsWidthBase * dsWindowScale;
        const viewportHeight = dsHeightBase * dsWindowScale;

        // set the ds-viewport element size to the scaled window size
        if (viewport) {
          viewport.style.width = viewportWidth + 'px';
          viewport.style.height = viewportHeight + 'px';
        }

        // forward current location query/hash into the iframe so ds.html gets ?channel=...
        if (frame) {
          if (!params) {
            params = '?dsWindowScale=' + encodeURIComponent(String(dsWindowScale));
          } else {
            // ensure dsWindowScale present
            if (!/[?&]dsWindowScale(=|&|$)/.test(params) && !/[?&]ds-window-scale(=|&|$)/.test(params)) {
              params = params + '&dsWindowScale=' + encodeURIComponent(String(dsWindowScale));
            }
          }
          frame.src = './ds.html' + params + hash;
        }

        function resize() {
          const wrapper = viewport.parentElement;
          const maxW = wrapper.clientWidth;
          const maxH = wrapper.clientHeight;
          // allow upscaling freely (no cap)
          const scale = Math.min(maxW / viewportWidth, maxH / viewportHeight);
          viewport.style.transform = 'scale(' + scale + ')';
        }
        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', resize);
        resize();
      })();
    </script>
  </body>
</html>
